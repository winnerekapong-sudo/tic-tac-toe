<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>

  <!-- Linking CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

  <header>

    <div class="logo">
      <span class="x">X</span>
      <span class="o">O</span>
    </div>


    <button id="turn">X TURN</button>

    <button id="restart">↻</button>

  </header>


  <div class="board" id="board"></div>


  <div class="scores">

    <div class="you">
      <small>X (YOU)</small>
      <b id="xScore">14</b>
    </div>


    <div class="ties">
      <small>TIES</small>
      <b id="tieScore">32</b>
    </div>


    <div class="cpu">
      <small>O (CPU)</small>
      <b id="oScore">11</b>
    </div>

  </div>


</div>


<!-- Linking JavaScript -->
<script src="script.js"></script>


</body>
</html>
