<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="start-screen">
  <h2>Choose Your Side</h2>
  <button onclick="choose('X')">Play X</button>
  <button onclick="choose('O')">Play O</button>
</div>

<!-- GAME -->
<div class="game">

  <header>
    <div class="logo">
      <span class="x">X</span>
      <span class="o">O</span>
    </div>

    <button id="turn">X TURN</button>

    <button id="restart">↻</button>
  </header>

  <div class="board" id="board"></div>

  <div class="scores">
    <div class="you">
      <small>X (YOU)</small>
      <b id="xScore">0</b>
    </div>

    <div class="ties">
      <small>TIES</small>
      <b id="tieScore">0</b>
    </div>

    <div class="cpu">
      <small>O (CPU)</small>
      <b id="oScore">0</b>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
